<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ETF 动量轮动周报</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 960px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 24px; }
        .market-status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; }
        .market-status.STRONG { background: #f6ffed; color: #389e0d; }
        .market-status.WEAK { background: #fff1f0; color: #cf1322; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #333; }
        .strategy-title { margin-top: 32px; color: #1890ff; }
        .weight { font-weight: bold; color: #d48806; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1>ETF 动量轮动周报</h1>
    <p class="subtitle">
        交易日：<span th:text="${advice.tradeDate}">2024-01-01</span>
        &nbsp;|&nbsp;
        大盘状态：
        <span class="market-status" th:classappend="${advice.marketStatus}" th:text="${advice.marketStatus == 'STRONG' ? '强势' : '弱势'}">强势</span>
    </p>

    <div th:each="result : ${advice.subResults}">
        <h2 class="strategy-title" th:text="${result.strategyType == 'BALANCED' ? '平衡型策略' : '积极型策略'}">平衡型策略</h2>
        <p>
            目标总仓位：<span class="weight" th:text="${#numbers.formatDecimal(result.totalWeight * 100, 1, 2)} + '%'">70.00%</span>
        </p>
        <table>
            <thead>
            <tr>
                <th>基金代码</th>
                <th>基金名称</th>
                <th>权重</th>
                <th>入选原因</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pos : ${result.positions}">
                <td th:text="${pos.fundCode}">510300</td>
                <td th:text="${pos.fundName}">沪深300ETF</td>
                <td class="weight" th:text="${#numbers.formatDecimal(pos.weight * 100, 1, 2)} + '%'">30.00%</td>
                <td th:text="${pos.reason}">动量10.00%</td>
            </tr>
            <tr th:if="${#lists.isEmpty(result.positions)}">
                <td colspan="4" class="empty">本期无持仓建议</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
